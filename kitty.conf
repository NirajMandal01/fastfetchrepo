# ~/.config/kitty/kitty.conf
# Dark & minimal theme, JetBrains Mono, slight transparency

# ---- Font ----
font_family      JetBrains Mono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         13.0
disable_ligatures never

# ---- Window ----
background_opacity        0.65
background_blur           20
window_padding_width       10
hide_window_decorations    no
confirm_os_window_close    0

# ---- Tab bar (minimal) ----
tab_bar_edge                bottom
tab_bar_style                powerline
tab_powerline_style          slanted
tab_bar_min_tabs             1
tab_title_template           "{title}"

# ---- Cursor ----
cursor_shape          beam
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ---- Scrollback ----
scrollback_lines  10000
wheel_scroll_multiplier  3.0

# ---- Mouse ----
mouse_hide_wait  3.0
url_style        curly

# ---- Bell ----
enable_audio_bell  no
visual_bell_duration 0.0

# ---- Performance ----
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ---- Color scheme: Dark & Minimal ----
foreground            #c5c8c6
background            #0f1113
selection_foreground  #0f1113
selection_background  #c5c8c6

# Cursor colors
cursor            #c5c8c6
cursor_text_color #0f1113

# URL underline color
url_color #6a9fb5

# Black
color0  #1d1f21
color8  #666666

# Red
color1  #cc6666
color9  #d54e53

# Green
color2  #b5bd68
color10 #b9ca4a

# Yellow
color3  #f0c674
color11 #e7c547

# Blue
color4  #81a2be
color12 #7aa6da

# Magenta
color5  #b294bb
color13 #c397d8

# Cyan
color6  #8abeb7
color14 #70c0b1

# White
color7  #c5c8c6
color15 #eaeaea

# ---- Advanced ----
shell_integration enabled
allow_remote_control yes
update_check_interval 0
macos_option_as_alt yes
